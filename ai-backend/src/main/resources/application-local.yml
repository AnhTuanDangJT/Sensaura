# Local dev: H2 in-memory DB + dev JWT default (override with JWT_SECRET if you want).
# Run: .\run-local.ps1   OR   set SPRING_PROFILES_ACTIVE=local then bootRun
spring:
  datasource:
    url: jdbc:h2:mem:localdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-not-for-production-min-32-chars!!}
